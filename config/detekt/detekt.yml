build:
  maxIssues: 0
  excludeCorrectable: false

complexity:
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 10
  LargeClass:
    active: true
    threshold: 300
  ComplexCondition:
    active: true
    threshold: 4

naming:
  FunctionNaming:
    active: true
    # Allow PascalCase function names for Jetpack Compose composables
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*|[a-zA-Z0-9]*'

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: true
